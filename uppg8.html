<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uppgift 8: Onward</title>
  </head>
  <body> 
     <h1>Jämna och udda tal</h1>

    <div id="resultat"></div>

    <script>

        let resultat = document.getElementById("resultat");

        for (let i = 1; i <= 10; i++) {

            if (i % 2 === 0) {
                resultat.innerHTML += i + " är jämnt <br>";
            } else {
                resultat.innerHTML += i + " är udda <br>";
            }

        }

    </script>

    

    
  
  </body>




</html>
