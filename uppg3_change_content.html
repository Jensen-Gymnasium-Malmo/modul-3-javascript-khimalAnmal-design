<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uppgift 3: Change content</title>
    <style>
      .recipe {
        display: none;
      }
    </style>
  </head>
  <body>
    <button onclick="showCarbonara()">Show carbonara ingredients</button>
    <button onclick="showPizza()">Show pizza ingredients</button>

    <div id="ingredients"></div>

    <script>
      function showCarbonara() {
        document.getElementById("ingredients").innerHTML = "Carbonara ingredients: pasta, eggs, cheese, pancetta";
      }

      function showPizza() {
        document.getElementById("ingredients").innerHTML = "Pizza ingredients: dough, sauce, cheese, toppings";
      }
    </script>
  </body>
</html>
